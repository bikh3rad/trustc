version: "3.9"

# trustC — local development stack
# Spins up Postgres (one cluster, schema-per-service), NATS (event bus), Redis.
# Each microservice is then run via `make run-<svc>` or `docker compose up <svc>`.

services:
  postgres:
    image: postgres:16-alpine
    container_name: trustc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: trustc
      POSTGRES_PASSWORD: trustc_dev
      POSTGRES_DB: trustc
    ports:
      - "5432:5432"
    volumes:
      - ./deploy/data/postgres:/var/lib/postgresql/data
      - ./db/migrations:/migrations:ro
      - ./deploy/postgres-init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trustc -d trustc"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2.10-alpine
    container_name: trustc-nats
    restart: unless-stopped
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: trustc-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    image: postgres:16-alpine
    container_name: trustc-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: trustc_dev
    volumes:
      - ./db/migrations:/migrations:ro
      - ./deploy/run-migrations.sh:/run-migrations.sh:ro
    entrypoint: ["/bin/sh", "/run-migrations.sh"]

  seed:
    image: postgres:16-alpine
    container_name: trustc-seed
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      PGPASSWORD: trustc_dev
    volumes:
      - ./db/seed:/seed:ro
    entrypoint: >
      sh -c "psql -h postgres -U trustc -d trustc -f /seed/seed.sql"

volumes:
  postgres_data:
